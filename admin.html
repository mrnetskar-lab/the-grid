<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE GRID — Admin Dev Tool</title>
  <style>
    :root{--bg:#0a0a0f;--panel:#12121b;--panel-2:#171723;--border:#28283a;--text:#eef0ff;--muted:#9ea3bf;--accent:#f0308a;--ok:#6dde9d;--bad:#ff7c7c}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}
    .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.sidebar{padding:16px;background:var(--panel);border-right:1px solid var(--border)}
    .nav{display:grid;gap:8px;margin-top:10px}.nav button{border:1px solid var(--border);background:var(--panel-2);color:var(--text);padding:10px;border-radius:8px;text-align:left;cursor:pointer}.nav button.active{border-color:var(--accent)}
    .content{padding:20px}.section{display:none}.section.active{display:block}.row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.full{grid-column:1/-1}
    .field{display:flex;flex-direction:column;gap:6px}label{font-size:12px;color:var(--muted)}input,textarea,select,button{font:inherit}
    input,textarea,select{background:var(--panel-2);border:1px solid var(--border);color:var(--text);padding:9px;border-radius:8px}textarea{min-height:90px;resize:vertical}
    .btn{background:var(--accent);border:0;color:#fff;padding:10px 12px;border-radius:8px;cursor:pointer}.btn.secondary{background:#2b3252}
    .status{margin-top:8px;font-size:13px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.chip{padding:6px 10px;border:1px solid var(--border);background:var(--panel-2);border-radius:999px;cursor:pointer}
    .char-list,.shortcut-row{display:flex;gap:8px;flex-wrap:wrap}.bubble-wrap{border:1px solid var(--border);background:var(--panel-2);border-radius:8px;padding:10px;height:420px;overflow:auto;display:flex;flex-direction:column;gap:8px}
    .bubble{max-width:75%;padding:8px 10px;border-radius:12px}.u{background:#2a2f4a;align-self:flex-end}.a{background:#3a1c2c;align-self:flex-start}
    .system{border:1px solid var(--border);background:var(--panel-2);padding:10px;border-radius:8px;white-space:pre-wrap}.ab{display:grid;grid-template-columns:1fr 1fr;gap:10px}.ab img{width:100%;border:1px solid var(--border);border-radius:8px}
    .snip{border:1px solid var(--border);background:var(--panel-2);border-radius:8px;padding:8px;cursor:pointer}.snips{display:grid;gap:8px;margin-top:8px}
    .mono{background:#09090d;border:1px solid var(--border);padding:10px;border-radius:8px;white-space:pre-wrap;min-height:120px;font-family:ui-monospace,Menlo,monospace}
    .thumb{max-width:180px;border:1px solid var(--border);border-radius:8px}.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
    details{border:1px solid var(--border);border-radius:8px;padding:8px;background:var(--panel-2)} .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;background:#666}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div><b>Admin Dev Tool</b></div>
    <div style="font-size:12px;color:var(--muted)">Key stored in localStorage</div>
    <div style="display:flex;gap:6px;margin-top:8px"><input id="adminKey" placeholder="x-admin-key"/><button class="btn secondary" id="saveKey">Save</button></div>
    <nav class="nav">
      <button class="active" data-sec="characters">1) Characters</button>
      <button data-sec="camera">2) Camera Lab</button>
      <button data-sec="snippets">3) Prompt Snippets</button>
      <button data-sec="notes">4) Smoke Test Log</button>
      <button data-sec="chat">5) Chat</button>
      <button data-sec="commands">6) Commands</button>
    </nav>
  </aside>
  <main class="content">
    <section id="characters" class="section active">
      <h2>Characters</h2><div class="char-list" id="charList"></div>
      <button class="btn secondary" id="newChar" type="button">New character</button>
      <form id="charForm">
        <div class="row">
          <div class="field"><label>id</label><input id="c_id" required/></div><div class="field"><label>name</label><input id="c_name"/></div>
          <div class="field"><label>color</label><input id="c_color" type="color" value="#9f67ff"/></div><div class="field"><label>status</label><select id="c_status"><option>ONLINE</option><option>OBSERVANT</option><option>LISTENING</option><option>UNSTABLE</option></select></div>
          <div class="field full"><label>route</label><input id="c_route"/></div><div class="field full"><label>bio</label><textarea id="c_bio"></textarea></div>
          <div class="field full"><label>greeting</label><textarea id="c_greeting"></textarea></div><div class="field full"><label>identity</label><textarea id="c_identity"></textarea></div>
          <div class="field full"><label>anchors (JSON)</label><textarea id="c_anchors">{}</textarea></div><div class="field full"><label>camera_look</label><textarea id="c_camera_look"></textarea></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
          <button class="btn" type="submit">Save character</button>
          <button class="btn secondary" id="exportChar" type="button">Export JSON</button>
          <button class="btn secondary" id="importChar" type="button">Import JSON</button><input id="importCharFile" type="file" accept="application/json" style="display:none"/>
          <button class="btn secondary" id="uploadPromptTxt" type="button">Upload prompt .txt</button><input id="promptTxtFile" type="file" accept=".txt,text/plain" style="display:none"/>
          <select id="promptTarget"><option value="focused">Focused field</option><option value="subject">subject</option><option value="atmosphere">atmosphere</option><option value="scenery">scenery</option><option value="style">style</option><option value="quality">quality</option></select>
        </div>
        <div class="status" id="charStatus"></div>
      </form>
    </section>

    <section id="camera" class="section">
      <h2>Camera Lab</h2>
      <div class="grid2">
        <div>
          <div class="field"><label>character</label><select id="labCharacter"></select></div>
          <div class="field"><label>subject</label><textarea id="pb_subject"></textarea></div>
          <div class="field"><label>atmosphere</label><textarea id="pb_atmo"></textarea></div>
          <div class="shortcut-row"><button class="btn secondary atmo" data-v="warm golden hour light, intimate framing, slightly soft focus" type="button">Warm</button><button class="btn secondary atmo" data-v="soft natural lighting, muted palette, quiet intimate interior, cinematic still" type="button">Calm</button><button class="btn secondary atmo" data-v="dramatic side lighting, low lamplight, intense charged atmosphere, close framing" type="button">Charged</button><button class="btn secondary atmo" data-v="harsh shadows, cool blue tones, high contrast, unsettling stillness" type="button">Tense</button></div>
          <div class="field"><label>scenery</label><textarea id="pb_scenery">rooftop at night, city lights below</textarea></div>
          <div class="field"><label>style</label><textarea id="pb_style">35mm film, f/1.8, shallow depth of field</textarea></div>
          <div class="field"><label>quality</label><textarea id="pb_quality">Photorealistic. Masterpiece quality.</textarea></div>
          <div class="field"><label>cast_lock</label><textarea id="pb_cast">The only subject is one young woman. No men.</textarea></div>
          <div class="field"><label>Live prompt preview</label><textarea id="pb_preview" readonly></textarea></div>
          <div style="display:flex;gap:8px"><button class="btn secondary" id="copyPrompt" type="button">Copy prompt</button><button class="btn secondary" id="saveSnippet" type="button">Save as snippet</button></div>
        </div>
        <div>
          <div class="field"><label>Model</label><div><label><input type="radio" name="model" value="fal-ai/flux-pro/v1.1-ultra" checked/> fal-ai/flux-pro/v1.1-ultra</label><br><label><input type="radio" name="model" value="fal-ai/flux-pro/v1.1"/> fal-ai/flux-pro/v1.1</label><br><label><input type="radio" name="model" value="fal-ai/flux-realism"/> fal-ai/flux-realism</label></div></div>
          <div class="field"><label>num_inference_steps <span id="fal_steps_v">28</span></label><input id="fal_steps" type="range" min="1" max="60" value="28"/></div>
          <div class="field"><label>guidance_scale <span id="fal_gs_v">3.5</span></label><input id="fal_gs" type="range" min="1" max="15" step="0.1" value="3.5"/></div>
          <div class="field"><label>safety_tolerance <span id="fal_safe_v">6</span></label><input id="fal_safe" type="range" min="1" max="6" step="1" value="6"/></div>
          <div class="field"><label>seed</label><input id="fal_seed" type="number" placeholder="empty = random"/></div>
          <div class="field"><label>aspect_ratio</label><select id="fal_aspect"><option>2:3</option><option>3:4</option><option>1:1</option><option>4:3</option><option>3:2</option></select></div>
          <div class="field"><label>output_format</label><select id="fal_format"><option>jpeg</option><option>png</option><option>webp</option></select></div>
          <details><summary>ComfyUI parameters</summary>
            <div class="field"><label>steps</label><input id="comfy_steps" type="range" min="1" max="60" value="35"/></div>
            <div class="field"><label>cfg</label><input id="comfy_cfg" type="range" min="1" max="15" step="0.5" value="7"/></div>
            <div class="field"><label>sampler_name</label><select id="comfy_sampler"><option>dpm_2m</option><option>euler</option><option>euler_a</option><option>dpm++2m_karras</option></select></div>
            <div class="field"><label>scheduler</label><select id="comfy_scheduler"><option>karras</option><option>normal</option><option>exponential</option></select></div>
            <div class="field"><label>denoise</label><input id="comfy_denoise" type="range" min="0" max="1" step="0.05" value="1"/></div>
            <div class="row"><div class="field"><label>width</label><input id="comfy_w" type="number" value="512"/></div><div class="field"><label>height</label><input id="comfy_h" type="number" value="768"/></div></div>
          </details>
          <div style="display:flex;gap:8px;margin-top:8px"><button class="btn" id="generate" type="button">Generate</button><button class="btn secondary" id="saveLook" type="button">Save look</button></div>
          <div class="status" id="cameraStatus"></div>
        </div>
      </div>
      <h3>A/B comparison</h3>
      <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
        <label style="font-size:12px;color:var(--muted)">duration</label>
        <select id="animDuration"><option value="5" selected>5 sec</option><option value="10">10 sec</option></select>
        <label style="font-size:12px;color:var(--muted)">motion_strength <span id="animMotionV">0.5</span></label>
        <input id="animMotion" type="range" min="0" max="1" step="0.1" value="0.5" style="width:180px"/>
      </div>
      <div class="ab" id="abShots"></div>
      <h3>ComfyUI</h3>
      <div><span class="dot" id="comfyDot"></span><span id="comfyText">checking...</span></div>
      <div class="field"><label>Workflow JSON</label><textarea id="workflowJson">{}</textarea></div>
      <button class="btn secondary" id="runWorkflow" type="button">Run workflow</button>
      <div class="thumbs" id="comfyThumbs"></div>
    </section>

    <section id="snippets" class="section"><h2>Prompt Snippets</h2><div class="field"><label>add custom snippet</label><input id="newSnippet"/></div><button class="btn secondary" id="addSnippet" type="button">Add</button><div class="snips" id="snipList"></div></section>

    <section id="notes" class="section"><h2>Smoke Test Log</h2><div class="field"><label>note</label><textarea id="noteText"></textarea></div><div class="field"><input id="noteImage" type="file" accept="image/*"/></div><img id="notePreview" class="thumb" style="display:none"/><div style="display:flex;gap:8px"><button class="btn" id="submitNote" type="button">Submit</button><button class="btn secondary" id="exportNotes" type="button">Export all notes .zip</button></div><div class="status" id="noteStatus"></div><div id="noteList"></div></section>

    <section id="chat" class="section"><h2>Chat</h2><div class="grid2"><div><div class="field"><label>character</label><select id="chatChar"></select></div><div class="bubble-wrap" id="chatList"></div><div style="display:flex;gap:8px;margin-top:8px"><input id="chatInput" placeholder="Say something"/><button class="btn" id="sendChat" type="button">Send</button><button class="btn secondary" id="clearChat" type="button">Clear history</button></div></div><div><label>System prompt (identity)</label><div class="system" id="chatIdentity"></div></div></div><div class="status" id="chatStatus"></div></section>

    <section id="commands" class="section"><h2>Commands</h2><div style="display:flex;gap:8px"><select id="cmdSel"><option>clear-all-history</option><option>clear-images</option><option>list-images</option><option>ping-comfy</option><option>server-status</option></select><button class="btn" id="runCmd" type="button">Run</button></div><pre class="mono" id="cmdOut"></pre></section>
  </main>
</div>
<script>
const KEY='grid_admin_key', DEF='velora-admin-2025', SN='grid_custom_snippets';
const $=(id)=>document.getElementById(id); const state={chars:[],shots:[],snips:JSON.parse(localStorage.getItem(SN)||'[]'),chat:[]};
const baseSnips=['Photorealistic portrait, ultra-detailed skin texture','35mm lens, shallow depth of field, cinematic framing','Golden hour window light, subtle highlights','Natural color grading, filmic contrast','Fine film grain, crisp focus on eyes','Moody low-key lighting, rim light','Present-day styling, believable wardrobe','Masterpiece quality, non-illustrative photography','No text, no watermark, no overlays','Realistic skin translucency, accurate anatomy'];
let focusedField='pb_subject';
function headers(h={}){return {'x-admin-key':localStorage.getItem(KEY)||DEF,...h};}
async function jfetch(url,opt={}){const r=await fetch(url,{...opt,headers:headers(opt.headers||{})}); const d=await r.json(); if(!r.ok||d.ok===false) throw new Error(d.error||'request failed'); return d;}
function stat(id,msg,ok=true){$(id).textContent=msg; $(id).style.color=ok?'var(--ok)':'var(--bad)';}
function section(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));$(id).classList.add('active');document.querySelector(`[data-sec="${id}"]`).classList.add('active');}
function fill(c={}){$('c_id').value=c.id||'';$('c_name').value=c.name||'';$('c_color').value=c.color||'#9f67ff';$('c_status').value=c.status||'ONLINE';$('c_route').value=c.route||'';$('c_bio').value=c.bio||'';$('c_greeting').value=c.greeting||'';$('c_identity').value=c.identity||'';$('c_anchors').value=JSON.stringify(c.anchors||{},null,2);$('c_camera_look').value=c.camera_look||'';syncLabFromChar();}
function payload(){let anchors={};try{anchors=JSON.parse($('c_anchors').value||'{}')}catch{} return{id:$('c_id').value.trim().toLowerCase(),name:$('c_name').value,color:$('c_color').value,status:$('c_status').value,route:$('c_route').value,bio:$('c_bio').value,greeting:$('c_greeting').value,identity:$('c_identity').value,anchors,camera_look:$('c_camera_look').value};}
function renderChars(){const l=$('charList');l.innerHTML=''; state.chars.forEach(c=>{const b=document.createElement('button');b.className='chip';b.type='button';b.textContent=`${c.name||c.id} (${c.id})`;b.onclick=()=>fill(c);l.appendChild(b);});['labCharacter','chatChar'].forEach(id=>$(id).innerHTML=state.chars.map(c=>`<option value="${c.id}">${c.name||c.id}</option>`).join(''));}
function syncLabFromChar(){const id=$('c_id').value||$('labCharacter').value; if(id) $('labCharacter').value=id; const c=state.chars.find(x=>x.id===$('labCharacter').value); $('pb_subject').value=(c?.camera_look)||$('c_camera_look').value||''; updatePrompt();}
function updatePrompt(){const txt=[$('pb_subject').value,$('pb_atmo').value,$('pb_scenery').value,$('pb_style').value,$('pb_quality').value,$('pb_cast').value].filter(Boolean).join('. '); $('pb_preview').value=txt;}
function renderAB(){const box=$('abShots'); box.innerHTML=''; state.shots.slice(0,2).forEach((s,idx)=>{const d=document.createElement('div'); d.innerHTML=`<div style="color:var(--muted);font-size:12px">${s.timestamp} — ${s.backend||'unknown'}</div><img src="${s.path}"/><div style="display:flex;gap:8px;margin-top:8px"><button class="btn secondary" type="button" data-anim="${idx}">Animate</button>${s.videoPath?`<a class="btn secondary" href="${s.videoPath}" download>Save video</a>`:''}</div>${s.videoPath?`<video src="${s.videoPath}" controls autoplay loop muted style="width:100%;margin-top:8px;border:1px solid var(--border);border-radius:8px"></video>`:''}`; box.appendChild(d);}); box.querySelectorAll('[data-anim]').forEach(btn=>btn.onclick=()=>animateShot(Number(btn.dataset.anim)).catch(err=>stat('cameraStatus',err.message,false)));}
function renderSnips(){const list=$('snipList');list.innerHTML=''; [...baseSnips,...state.snips].forEach((s,i)=>{const d=document.createElement('div');d.className='snip';d.textContent=s;d.onclick=()=>navigator.clipboard.writeText(s); if(i>=baseSnips.length){const x=document.createElement('button');x.className='btn secondary';x.type='button';x.textContent='Delete';x.onclick=(e)=>{e.stopPropagation();state.snips.splice(i-baseSnips.length,1);localStorage.setItem(SN,JSON.stringify(state.snips));renderSnips();};d.appendChild(document.createElement('br'));d.appendChild(x);} list.appendChild(d);});}
function renderNotes(notes){const l=$('noteList');l.innerHTML='';notes.forEach(n=>{const d=document.createElement('div');d.className='snip';d.innerHTML=`<div style="color:var(--muted);font-size:12px">${n.timestamp}</div><div>${n.text||''}</div>${n.imagePath?`<img class="thumb" src="${n.imagePath}"/>`:''}`;l.appendChild(d);});}
function renderChat(){const l=$('chatList');l.innerHTML='';state.chat.forEach(m=>{const d=document.createElement('div');d.className=`bubble ${m.role==='user'?'u':'a'}`;d.textContent=m.text;l.appendChild(d);}); l.scrollTop=l.scrollHeight;}
async function loadChars(){const d=await jfetch('/api/admin/characters');state.chars=d.characters||[];renderChars(); if(state.chars[0]) fill(state.chars[0]); updateChatIdentity();}
async function saveChar(e){e.preventDefault();const p=payload();if(!/^[a-z0-9-]+$/.test(p.id)) return stat('charStatus','Invalid id',false);await jfetch(`/api/admin/characters/${p.id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});stat('charStatus',`Saved ${p.id}`);await loadChars();}
async function gen(){const character=$('labCharacter').value; const preview=$('pb_preview').value; const falParams={model:document.querySelector('input[name="model"]:checked').value,num_inference_steps:Number($('fal_steps').value),guidance_scale:Number($('fal_gs').value),safety_tolerance:Number($('fal_safe').value),aspect_ratio:$('fal_aspect').value,output_format:$('fal_format').value}; if($('fal_seed').value) falParams.seed=Number($('fal_seed').value); const comfyParams={steps:Number($('comfy_steps').value),cfg:Number($('comfy_cfg').value),sampler_name:$('comfy_sampler').value,scheduler:$('comfy_scheduler').value,denoise:Number($('comfy_denoise').value),width:Number($('comfy_w').value),height:Number($('comfy_h').value)}; const d=await fetch('/api/camera/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({character,mood:$('pb_atmo').value,customPrompt:preview,falParams,comfyParams})}).then(r=>r.json()); if(!d.ok) throw new Error(d.error||'generate failed'); state.shots.unshift({...d.shot,timestamp:new Date().toLocaleString()}); state.shots=state.shots.slice(0,2); renderAB(); stat('cameraStatus','Generated shot');}
async function animateShot(i){const shot=state.shots[i]; if(!shot?.path) throw new Error('No generated shot available'); const d=await fetch('/api/camera/animate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imagePath:shot.path,duration:Number($('animDuration').value),motion_strength:Number($('animMotion').value)})}).then(r=>r.json()); if(!d.ok) throw new Error(d.error||'animate failed'); shot.videoPath=d.path||d.video?.path; renderAB(); stat('cameraStatus','Video generated');}
async function saveLook(){await jfetch('/api/admin/camera-look',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:$('labCharacter').value,value:$('pb_subject').value})});$('c_camera_look').value=$('pb_subject').value; stat('cameraStatus','Look saved');}
async function loadNotes(){const d=await jfetch('/api/admin/notes');renderNotes(d.notes||[]);} 
async function sendNote(){const fd=new FormData(); fd.append('note',`${new Date().toISOString()} — ${$('noteText').value.trim()}`); const f=$('noteImage').files[0]; if(f) fd.append('image',f); const r=await fetch('/api/admin/notes',{method:'POST',headers:headers(),body:fd}); const d=await r.json(); if(!r.ok||d.ok===false) throw new Error(d.error||'failed'); stat('noteStatus','Note saved'); $('noteText').value=''; $('noteImage').value=''; $('notePreview').style.display='none'; await loadNotes();}
async function comfyHealth(){const d=await jfetch('/api/admin/comfy/health'); $('comfyDot').style.background=d.available?'var(--ok)':'var(--bad)'; $('comfyText').textContent=d.available?`Available ${d.version||''}`:'Unavailable';}
async function comfyImages(){const d=await jfetch('/api/admin/comfy/images'); const box=$('comfyThumbs'); box.innerHTML=''; d.images.forEach(f=>{const img=document.createElement('img');img.className='thumb';img.src=`/api/admin/comfy/image/${encodeURIComponent(f)}`;img.onclick=()=>window.open(img.src,'_blank');box.appendChild(img);});}
async function comfyRun(){let wf={}; try{wf=JSON.parse($('workflowJson').value||'{}')}catch{throw new Error('Invalid workflow JSON');} const d=await jfetch('/api/admin/comfy/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workflow:wf})}); stat('cameraStatus',`Comfy prompt_id: ${d.prompt_id||'n/a'}`);}
async function sendChat(){const id=$('chatChar').value; const text=$('chatInput').value.trim(); if(!text) return; state.chat.push({role:'user',text}); renderChat(); $('chatInput').value=''; const r=await fetch(`/api/characters/${id}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})}); const d=await r.json(); if(!r.ok||d.ok===false){stat('chatStatus',d.error||'chat failed',false); return;} state.chat.push({role:'assistant',text:d.reply||'...'}); renderChat();}
async function clearChat(){const id=$('chatChar').value; await fetch(`/api/characters/${id}/history`,{method:'DELETE'}); state.chat=[]; renderChat(); stat('chatStatus','History cleared');}
function updateChatIdentity(){const id=$('chatChar').value; const c=state.chars.find(x=>x.id===id); $('chatIdentity').textContent=c?.identity||'';}
function exportChar(){const p=payload(); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(p,null,2)],{type:'application/json'})); a.download=`${p.id||'character'}.json`; a.click();}
function importChar(file){const fr=new FileReader(); fr.onload=()=>{try{fill(JSON.parse(String(fr.result||'{}')));stat('charStatus','Imported JSON');}catch{stat('charStatus','Invalid JSON',false);}}; fr.readAsText(file);}
function uploadPromptTxt(file){const fr=new FileReader(); fr.onload=()=>{const txt=String(fr.result||''); const t=$('promptTarget').value==='focused'?focusedField:({subject:'pb_subject',atmosphere:'pb_atmo',scenery:'pb_scenery',style:'pb_style',quality:'pb_quality'}[$('promptTarget').value]||'pb_subject'); $(t).value+=($(t).value?'\n':'')+txt; updatePrompt();}; fr.readAsText(file);}
async function runCmd(){const d=await jfetch('/api/admin/commands',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:$('cmdSel').value})}); $('cmdOut').textContent=JSON.stringify(d,null,2);} 
function bind(){ $('adminKey').value=localStorage.getItem(KEY)||DEF; document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>section(b.dataset.sec)); $('saveKey').onclick=()=>localStorage.setItem(KEY,$('adminKey').value.trim()||DEF);
  $('charForm').addEventListener('submit',e=>saveChar(e).catch(err=>stat('charStatus',err.message,false))); $('newChar').onclick=()=>fill({anchors:{}}); $('exportChar').onclick=exportChar; $('importChar').onclick=()=>$('importCharFile').click(); $('importCharFile').onchange=e=>e.target.files[0]&&importChar(e.target.files[0]); $('uploadPromptTxt').onclick=()=>$('promptTxtFile').click(); $('promptTxtFile').onchange=e=>e.target.files[0]&&uploadPromptTxt(e.target.files[0]);
  ['pb_subject','pb_atmo','pb_scenery','pb_style','pb_quality','pb_cast'].forEach(id=>{$(id).addEventListener('input',updatePrompt); $(id).addEventListener('focus',()=>focusedField=id);}); document.querySelectorAll('.atmo').forEach(b=>b.onclick=()=>{$('pb_atmo').value=b.dataset.v;updatePrompt();});
  $('labCharacter').onchange=syncLabFromChar; ['fal_steps','fal_gs','fal_safe'].forEach(id=>$(id).oninput=()=>$(id+'_v').textContent=$(id).value);
  $('animMotion').oninput=()=>$('animMotionV').textContent=$('animMotion').value;
  $('copyPrompt').onclick=()=>navigator.clipboard.writeText($('pb_preview').value); $('saveSnippet').onclick=()=>{const s=$('pb_preview').value.trim();if(s){state.snips.push(s);localStorage.setItem(SN,JSON.stringify(state.snips));renderSnips();}};
  $('generate').onclick=()=>gen().catch(err=>stat('cameraStatus',err.message,false)); $('saveLook').onclick=()=>saveLook().catch(err=>stat('cameraStatus',err.message,false)); $('runWorkflow').onclick=()=>comfyRun().catch(err=>stat('cameraStatus',err.message,false));
  $('addSnippet').onclick=()=>{const s=$('newSnippet').value.trim(); if(!s)return; state.snips.push(s); localStorage.setItem(SN,JSON.stringify(state.snips)); $('newSnippet').value=''; renderSnips();};
  $('noteImage').onchange=()=>{const f=$('noteImage').files[0]; if(!f) return; $('notePreview').src=URL.createObjectURL(f); $('notePreview').style.display='block';}; $('submitNote').onclick=()=>sendNote().catch(err=>stat('noteStatus',err.message,false)); $('exportNotes').onclick=()=>window.open('/api/admin/notes/export','_blank');
  $('chatChar').onchange=updateChatIdentity; $('sendChat').onclick=()=>sendChat().catch(err=>stat('chatStatus',err.message,false)); $('clearChat').onclick=()=>clearChat().catch(err=>stat('chatStatus',err.message,false));
  $('runCmd').onclick=()=>runCmd().catch(err=>{$('cmdOut').textContent=err.message;});
}
bind(); renderSnips(); loadChars().catch(err=>stat('charStatus',err.message,false)); loadNotes().catch(err=>stat('noteStatus',err.message,false)); comfyHealth(); comfyImages();
</script>
